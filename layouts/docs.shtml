<extend template="base.shtml">
<head id="head">
</head>
<body id="body">
	<h1 :text="$page.title"></h1>
	<div :html="$page.content()"></div>
	<div :loop="$page.subpages()">
		<div class="contents">
			<a href="$loop.it.link()">
				<h2 :text="$loop.it.title"></h2>
			</a>
			<ctx :if="$loop.it.description.len().gt(0)">
				<span :text="$loop.it.description"></span>
			</ctx>
		</div>
	</div>
</body>
